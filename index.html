    <style>
        .logo{
            font-style: bold;
            font-size: 150px ;
                color: rgb(255, 255, 255);
                text-shadow: 5px 5px 10px black;
            animation: alternate 2s ease-in-out infinite popln;
        }
        body{
            background-image: url(https://thumbs.dreamstime.com/b/black-friday-scene-crowded-malls-long-queues-online-shopping-deals-wooden-background-black-friday-scene-crowded-318363939.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            animation: popln 2s ease forwards;
        }
        @keyframes popln{
            from{opacity: 0; transform: scale(2);}
            to{opacity: 1; transform: scale(1);}
        }
         @keyframes alternate{
            0%{color: rgb(255, 255, 255); text-shadow: 5px 5px 10px black;}
            50%{color: rgb(53, 22, 22); text-shadow: 5px 5px 10px white;}
            100%{color: rgb(255, 255, 255); text-shadow: 5px 5px 10px black;}
    </style>
</head>
