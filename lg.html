<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            background-image: url(https://img.freepik.com/free-photo/arrangement-black-friday-shopping-carts-with-copy-space_23-2148667047.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        .box{
            height: 300px;
            width: 300px;
            border: 1px solid white;
        }
        img{
            border: 2px solid black;
            height: 50px;
            width: 50px;
            border-radius: 25px;margin-right: -225px;
            margin-left: -220px;
        }
        .bb{
            margin-right: 330px;
        }
    </style>
</head>
<body>
    <center>
    <h1>User Login</h1>
       
    <br>
    <div class="box">
        <a href="#" style="color: rgb(25, 5, 99);" onclick="ih()" class="bb" ><</a>
        <h2>Sign in </h2>
        <img src="👤"><br>
        <br>
        <label>Email:</label>
        <input type="email" placeholder="Enter your email" id="p">
        <br>
        <br>
        <label>Password:</label>
        <input type="password" placeholder="Enter your password" id="e">
        <br>
        <br>
        <button onclick="si()">Sign in</button>
        <p> if you not register then click here <a href="#" style="color: rgb(25, 5, 99);" onclick="rp()">register</a></p>
       
</div>
<script>
    function si(){
        let em=document.getElementById("e").value;
        let pass=document.getElementById("p").value;

        if(em==""||pass==""){
            alert("Please enter ur email & password");
            return;
        }
        window.location.href="dash.html"; 
    }
    function rp(){
        window.location.href="reg.html";
    }
    function ih(){
        window.location.href="index.html";
    }


</script>
    </center>
</body>
</html>
